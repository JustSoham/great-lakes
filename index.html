<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Great Lakes Demo</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    justify-content: center;
    align-items: center;
    position: relative;
}
/* Demo page background */
#page1 {
    position: relative;
    width: 100%;
    height: 100%;
    background: 
        linear-gradient(
            rgba(244, 246, 248, 0.85),
            rgba(244, 246, 248, 0.85)
        ),
        url('https://www.greatlakes.edu.in/chennai/assets/greatlakes/images/fellow-programme-in-management-banner.webp');
    background-size: cover;
    background-position: center;
    justify-content: center;
    align-items: center;
}

#page2 {
    background:
        linear-gradient(
            rgba(255, 255, 255, 0.85),
            rgba(255, 255, 255, 0.85)
        ),
        url('https://images.unsplash.com/photo-1509042239860-f550ce710b93');
    background-size: cover;
    background-position: center;
}




.page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    animation: fadeIn 1.2s ease;
}
    .page.active {
        display: flex;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        max-width: 450px;
    }

    h1 {
        margin-bottom: 15px;
        color: #333;
    }

    button {
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        background: #c1121f;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #9b0d17;
        transform: scale(1.05);
    }

    /* Reveal page */
    .rose-img {
        width: 100%;
        max-width: 300px;
        border-radius: 14px;
        margin-bottom: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .caption {
        font-size: 22px;
        font-weight: 600;
        color: #c1121f;
    }

    .sub {
        margin-top: 5px;
        font-size: 16px;
        color: #555;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <div class="card">
        <h1>A Demo of Great Lakes Essay Section</h1>
        <p>Please click below to view the demo.</p>
        <button onclick="openDemo()">Open Demo</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <div class="card">
        <img src="https://i.pinimg.com/1200x/06/d6/01/06d601efa19ae2c6ace8a9d09b86818c.jpg" alt="Rose" class="rose-img">
        <div class="caption">A Phool For My Fool</div>
        <div class="sub">Happy Rose Day Anindya 🌹</div>
    </div>
</div>

<script>
function openDemo() {
    const p1 = document.getElementById("page1");
    const p2 = document.getElementById("page2");

    p1.style.opacity = "0";
    setTimeout(() => {
        p1.classList.remove("active");
        p2.classList.add("active");
    }, 300);
}
</script>


</body>
</html>
